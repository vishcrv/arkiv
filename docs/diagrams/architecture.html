<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arkiv · CLI Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Geist', system-ui, sans-serif; background: #ffffff; color: #2d3142; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 2rem; }
    .frame { max-width: 1080px; width: 100%; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 0.66rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #4f5d75; margin-bottom: 0.5rem; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 1.5rem; }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Arkiv · stage 01</p>
    <h1>CLI stage — argparse + JSON</h1>

    <svg viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#ffffff"/>

      <!-- Arrows -->
      <line x1="188" y1="172" x2="240" y2="172" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="424" y1="172" x2="476" y2="172" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <line x1="660" y1="172" x2="712" y2="172" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Arrow labels -->
      <rect x="188" y="152" width="52" height="12" rx="2" fill="#ffffff"/>
      <text x="214" y="162" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">INVOKE</text>

      <rect x="420" y="152" width="60" height="12" rx="2" fill="#ffffff"/>
      <text x="450" y="162" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">load / save</text>

      <rect x="660" y="152" width="52" height="12" rx="2" fill="#ffffff"/>
      <text x="686" y="162" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">FS I/O</text>

      <!-- Terminal -->
      <rect x="60" y="140" width="128" height="64" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <rect x="68" y="148" width="28" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.40)" stroke-width="0.8"/>
      <text x="82" y="157" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">USR</text>
      <text x="124" y="176" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Terminal</text>
      <text x="124" y="192" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">shell · argv</text>

      <!-- main.py / cli.py -->
      <rect x="240" y="140" width="184" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="248" y="148" width="28" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="262" y="157" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CLI</text>
      <text x="332" y="176" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">main.py · cli.py</text>
      <text x="332" y="192" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">argparse · menu</text>

      <!-- store/db.py (focal) -->
      <rect x="476" y="140" width="184" height="64" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="484" y="148" width="36" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.50)" stroke-width="0.8"/>
      <text x="502" y="157" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DATA</text>
      <text x="568" y="176" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">store/db.py</text>
      <text x="568" y="192" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">json layer · pure fn</text>

      <!-- data.json -->
      <rect x="712" y="140" width="200" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <rect x="720" y="148" width="32" height="12" rx="2" fill="transparent" stroke="rgba(79,93,117,0.50)" stroke-width="0.8"/>
      <text x="736" y="157" fill="#4f5d75" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">FILE</text>
      <text x="812" y="176" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">data.json</text>
      <text x="812" y="192" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">local disk</text>

      <!-- Legend -->
      <line x1="40" y1="256" x2="960" y2="256" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="40" y="272" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="40" y="288" width="14" height="10" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="60" y="296" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Focal — data layer</text>

      <rect x="200" y="288" width="14" height="10" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="220" y="296" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">App code</text>

      <rect x="320" y="288" width="14" height="10" rx="2" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <text x="340" y="296" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">File store</text>

      <rect x="440" y="288" width="14" height="10" rx="2" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <text x="460" y="296" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">User / external</text>

      <line x1="580" y1="294" x2="608" y2="294" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="616" y="296" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Primary flow</text>
    </svg>
  </div>
</body>
</html>
