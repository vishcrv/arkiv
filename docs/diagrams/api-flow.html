<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arkiv · API Request Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Geist', system-ui, sans-serif; background: #ffffff; color: #2d3142; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 2rem; }
    .frame { max-width: 1080px; width: 100%; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 0.66rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #4f5d75; margin-bottom: 0.5rem; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 1.5rem; }
    svg { width: 100%; min-width: 960px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Sequence · Arkiv</p>
    <h1>API request flow — <span style="font-style: italic">GET /books</span></h1>

    <svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#ffffff"/>

      <!-- Lifelines (dashed verticals) -->
      <line x1="80"  y1="112" x2="80"  y2="460" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="260" y1="112" x2="260" y2="460" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="460" y1="112" x2="460" y2="460" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="660" y1="112" x2="660" y2="460" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="860" y1="112" x2="860" y2="460" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- Activation bars -->
      <rect x="76"  y="140" width="8" height="280" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>
      <rect x="256" y="160" width="8" height="240" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>
      <rect x="456" y="200" width="8" height="160" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>
      <rect x="656" y="240" width="8" height="80"  fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>
      <rect x="856" y="280" width="8" height="20"  fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>

      <!-- Actor boxes -->
      <rect x="20"  y="60" width="120" height="52" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <text x="80" y="88" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Browser</text>
      <text x="80" y="104" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">reader</text>

      <rect x="200" y="60" width="120" height="52" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="260" y="88" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">React SPA</text>
      <text x="260" y="104" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">:5173</text>

      <rect x="400" y="60" width="120" height="52" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="460" y="88" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">FastAPI</text>
      <text x="460" y="104" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">api.py :5000</text>

      <rect x="600" y="60" width="120" height="52" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="660" y="88" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">store.mysql</text>
      <text x="660" y="104" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">SQLAlchemy</text>

      <rect x="800" y="60" width="120" height="52" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <text x="860" y="88" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">MySQL</text>
      <text x="860" y="104" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">:3306</text>

      <!-- Messages -->
      <!-- 1. Browser → React -->
      <line x1="84" y1="140" x2="256" y2="140" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="130" y="128" width="80" height="12" rx="2" fill="#ffffff"/>
      <text x="170" y="138" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">CLICK · ROUTE</text>

      <!-- 2. React → FastAPI -->
      <line x1="264" y1="180" x2="456" y2="180" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <rect x="308" y="168" width="104" height="12" rx="2" fill="#ffffff"/>
      <text x="360" y="178" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">GET /books?sort=</text>

      <!-- 3. FastAPI → store.mysql -->
      <line x1="464" y1="220" x2="656" y2="220" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="508" y="208" width="104" height="12" rx="2" fill="#ffffff"/>
      <text x="560" y="218" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">list_books(sort)</text>

      <!-- 4. store → MySQL -->
      <line x1="664" y1="260" x2="856" y2="260" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="708" y="248" width="104" height="12" rx="2" fill="#ffffff"/>
      <text x="760" y="258" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">SELECT · PyMySQL</text>

      <!-- 5. MySQL → store (return, dashed) -->
      <line x1="856" y1="300" x2="664" y2="300" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <rect x="716" y="288" width="88" height="12" rx="2" fill="#ffffff"/>
      <text x="760" y="298" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">ROWS</text>

      <!-- 6. store → FastAPI (return, dashed) -->
      <line x1="656" y1="340" x2="464" y2="340" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <rect x="516" y="328" width="88" height="12" rx="2" fill="#ffffff"/>
      <text x="560" y="338" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">list[dict]</text>

      <!-- 7. FastAPI → React (primary response — accent coral) -->
      <line x1="456" y1="380" x2="264" y2="380" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <rect x="312" y="368" width="96" height="12" rx="2" fill="#ffffff"/>
      <text x="360" y="378" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">200 · JSON</text>

      <!-- 8. React → Browser (render, dashed) -->
      <line x1="256" y1="420" x2="84" y2="420" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <rect x="132" y="408" width="76" height="12" rx="2" fill="#ffffff"/>
      <text x="170" y="418" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">RENDER</text>

      <!-- Legend -->
      <line x1="40" y1="496" x2="960" y2="496" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="40" y="512" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <line x1="40" y1="534" x2="68" y2="534" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="76" y="537" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">HTTP request</text>

      <line x1="200" y1="534" x2="228" y2="534" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="236" y="537" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Primary response</text>

      <line x1="380" y1="534" x2="408" y2="534" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="416" y="537" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Internal call</text>

      <line x1="540" y1="534" x2="568" y2="534" stroke="#4f5d75" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <text x="576" y="537" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Return</text>
    </svg>
  </div>
</body>
</html>
