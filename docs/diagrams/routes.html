<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arkiv · Frontend Routes</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Geist', system-ui, sans-serif; background: #ffffff; color: #2d3142; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 2rem; }
    .frame { max-width: 1080px; width: 100%; }
    .eyebrow { font-family: 'Geist Mono', monospace; font-size: 0.66rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #4f5d75; margin-bottom: 0.5rem; }
    h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 1.5rem; }
    svg { width: 100%; min-width: 960px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Tree · Arkiv</p>
    <h1>Frontend routes — React Router</h1>

    <svg viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="#ffffff"/>

      <!-- Connectors (drawn first, behind nodes) -->
      <!-- Drop from root to bus -->
      <line x1="480" y1="128" x2="480" y2="160" stroke="#4f5d75" stroke-width="1"/>
      <!-- Horizontal bus -->
      <line x1="120" y1="160" x2="840" y2="160" stroke="#4f5d75" stroke-width="1"/>
      <!-- Drops to each child -->
      <line x1="120" y1="160" x2="120" y2="200" stroke="#4f5d75" stroke-width="1"/>
      <line x1="300" y1="160" x2="300" y2="200" stroke="#4f5d75" stroke-width="1"/>
      <line x1="480" y1="160" x2="480" y2="200" stroke="#4f5d75" stroke-width="1"/>
      <line x1="660" y1="160" x2="660" y2="200" stroke="#4f5d75" stroke-width="1"/>
      <line x1="840" y1="160" x2="840" y2="200" stroke="#4f5d75" stroke-width="1"/>

      <!-- Root: App / Router (focal) -->
      <rect x="400" y="80" width="160" height="48" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="408" y="88" width="40" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.50)" stroke-width="0.8"/>
      <text x="428" y="97" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ROOT</text>
      <text x="480" y="116" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">App</text>
      <text x="480" y="132" fill="#eb6c36" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">BrowserRouter</text>

      <!-- Leaf: Home -->
      <rect x="40" y="200" width="160" height="52" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="120" y="222" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Home</text>
      <text x="120" y="240" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">/</text>

      <!-- Leaf: Discover -->
      <rect x="220" y="200" width="160" height="52" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="300" y="222" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Discover</text>
      <text x="300" y="240" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">/discover</text>

      <!-- Leaf: BookDetail -->
      <rect x="400" y="200" width="160" height="52" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="480" y="222" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">BookDetail</text>
      <text x="480" y="240" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">/book/:id</text>

      <!-- Leaf: AuthorDetail -->
      <rect x="580" y="200" width="160" height="52" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="660" y="222" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">AuthorDetail</text>
      <text x="660" y="240" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">/author/:id</text>

      <!-- Leaf: Profile -->
      <rect x="760" y="200" width="160" height="52" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="840" y="222" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Profile</text>
      <text x="840" y="240" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">/profile</text>

      <!-- Legend -->
      <line x1="40" y1="288" x2="960" y2="288" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="40" y="304" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="40" y="316" width="14" height="10" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="60" y="324" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Router root</text>

      <rect x="180" y="316" width="14" height="10" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="200" y="324" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">Page component</text>
    </svg>
  </div>
</body>
</html>
